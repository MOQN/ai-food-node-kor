<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나의 기억, 너의 여백</title>

  <link rel="stylesheet" href="css/noto-serif-kr-local.css">
  <link rel="stylesheet" href="css/noto-serif-sc-local.css">
  <link rel="stylesheet" href="css/style.css">

  <script src="js/lib/p5.min.js"></script>
  <!-- <script src="js/lib/p5.sound.min.js"></script> -->

  <script async src="/node_modules/es-module-shims/dist/es-module-shims.js"></script>
  <script type="importmap">
    {
      "imports": {
        "three": "/node_modules/three/build/three.module.js",
        "three/addons/": "/node_modules/three/examples/jsm/",
        "tweakpane": "/node_modules/tweakpane/dist/tweakpane.js"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { Pane } from 'tweakpane';
    import { FontLoader } from 'three/addons/loaders/FontLoader.js';
    import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';
    window.THREE = THREE;
    window.OrbitControls = OrbitControls;
    window.Pane = Pane;
    window.FontLoader = FontLoader;
    window.TextGeometry = TextGeometry;
  </script>

  <script defer src="js/script-three.js"></script>
  <script defer src="js/script-p5.js"></script>
  <script defer src="js/script-gui.js"></script>
  <script defer src="js/script-shaders.js"></script>
  <script defer src="js/script-particles.js"></script>
  <script defer src="js/script-interface.js"></script>
  <script defer src="js/script-utils.js"></script>
  <script defer src="js/main.js"></script>
</head>

<body>
  <div id="container-three"></div>
  <div id="container-p5"></div>
  <!-- <div id="memory-text">我的记忆，你的留白</div> -->
  <div id="memory-text">
    <div class="memory-line memory-line-right">나의 기억<span class="memory-comma">,</span></div>
    <div class="memory-line memory-line-left">너의 여백</div>
  </div>
</body>

</html>
